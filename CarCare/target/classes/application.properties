server.port=${SERVER_PORT:18081}
spring.web.resources.static-locations=classpath:/static/
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# SPIKE: H2 seed data keeps the app runnable locally; set SQL_INIT_MODE=never when pointing DB_URL to production MySQL.
spring.datasource.url=${DB_URL:jdbc:h2:mem:carcare;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.sql.init.mode=${SQL_INIT_MODE:always}
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

kakao.client-id=${KAKAO_CLIENT_ID:31a78ed0030ac205ddf12b4382b1b74a}
kakao.redirect-uri=${KAKAO_REDIRECT_URI:http://localhost:18081/oauth/kakao/callback}
