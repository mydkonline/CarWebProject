<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservation | MotionVolt</title>
    <link rel="stylesheet" th:href="@{/css/apple.css}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div th:replace="fragments :: header"></div>
<main class="mv-shell py-12">
    <section class="mv-panel mx-auto max-w-lg overflow-hidden">
        <div class="bg-black p-6 text-center text-white">
            <h1 class="text-2xl font-semibold">예약 확인</h1>
        </div>
        <div class="p-6">
            <p>이름: <span th:text="${nickname}">nickname</span></p>
            <p class="mt-2">날짜: <span th:text="${session.date}">date</span></p>
        </div>
        <form th:action="@{/reservations}" method="post" class="p-6 pt-0 text-center">
            <input type="hidden" name="kakaoId" th:value="${kakaoId}">
            <input type="hidden" name="nickname" th:value="${nickname}">
            <input type="hidden" name="connected_at" th:value="${connected_at}">
            <input type="hidden" name="centerId" th:value="${session.centerId}">
            <input type="hidden" name="optionId" th:value="${session.optionId}">
            <input type="hidden" name="date" th:value="${session.date}">
            <button type="submit" class="mv-button bg-black px-6 py-3 text-white">예약 신청</button>
        </form>
    </section>
</main>
<div th:replace="fragments :: footer"></div>
</body>
</html>
