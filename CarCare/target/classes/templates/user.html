<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kakao Login | MotionVolt</title>
    <link rel="stylesheet" th:href="@{/css/apple.css}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div th:replace="fragments :: header"></div>
<main class="mv-shell py-16 text-center">
    <p class="mv-section-eyebrow">예약자 확인</p>
    <h1 class="mt-2 text-4xl font-semibold">카카오 로그인으로 예약을 확인하세요.</h1>
    <a class="mt-10 inline-block"
       th:href="@{https://kauth.kakao.com/oauth/authorize(client_id=${kakaoClientId},redirect_uri=${kakaoRedirectUri},response_type='code')}">
        <img th:src="@{/img/kakao_login.png}" alt="카카오 로그인" class="h-16">
    </a>
    <div class="mt-6">
        <a th:href="@{/dev/kakao-login}" class="mv-button inline-block border px-5 py-3">샘플 예약자로 계속</a>
    </div>
</main>
<div th:replace="fragments :: footer"></div>
</body>
</html>
