<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Admin | MotionVolt</title>
    <link rel="stylesheet" th:href="@{/css/apple.css}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div th:replace="fragments :: header"></div>
<main class="mv-shell py-12">
    <form th:action="@{/admin/accounts}" method="post" class="mv-panel max-w-md p-6">
        <h1 class="text-3xl font-semibold">관리자 생성</h1>
        <input type="text" name="username" placeholder="아이디" required class="mt-6 w-full border p-3">
        <input type="password" name="password" placeholder="비밀번호" required class="mt-4 w-full border p-3">
        <button type="submit" class="mv-button mt-6 w-full bg-black px-5 py-3 text-white">관리자 생성</button>
    </form>
</main>
<div th:replace="fragments :: footer"></div>
</body>
</html>
