<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고객센터 | MotionVolt</title>
    <link rel="stylesheet" th:href="@{/css/apple.css}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div th:replace="fragments :: header"></div>
<main class="mv-shell py-12">
    <h1 class="text-4xl font-semibold">고객센터</h1>
    <section class="mv-panel mt-8 p-6">
        <h2 class="text-2xl font-semibold">연락처 정보</h2>
        <p class="mt-4">전화번호: 080-600-6000</p>
        <p class="mt-2 text-gray-600">운영시간: 평일 09:00 - 18:00</p>
    </section>
    <section class="mt-6 grid gap-4">
        <details class="mv-panel p-5"><summary class="font-semibold">시승접수를 어떻게 해야 하나요?</summary><p class="mt-3 text-gray-600">모델, 옵션, 센터, 날짜를 선택한 뒤 카카오 로그인으로 신청합니다.</p></details>
        <details class="mv-panel p-5"><summary class="font-semibold">시승 후 반납은 어떻게 하나요?</summary><p class="mt-3 text-gray-600">선택한 서비스 센터의 안내에 따라 반납합니다.</p></details>
        <details class="mv-panel p-5"><summary class="font-semibold">차량 관리는 어떻게 확인하나요?</summary><p class="mt-3 text-gray-600">서비스 메뉴에서 주요 케어 항목을 확인할 수 있습니다.</p></details>
    </section>
</main>
<div th:replace="fragments :: footer"></div>
</body>
</html>
