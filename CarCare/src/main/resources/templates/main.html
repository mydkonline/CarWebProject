<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotionVolt</title>
    <link rel="icon" th:href="@{/img/favicon.ico}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css">
    <link rel="stylesheet" th:href="@{/css/apple.css}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js"></script>
    <script th:src="@{/js/main.js}" defer></script>
</head>
<body>
<div th:replace="fragments :: header"></div>
<main>
    <section class="mv-hero relative min-h-[720px] overflow-hidden bg-black">
        <div class="swiper banner-swiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img th:src="@{/img/carList/CAR_E2.jpg}" alt="MotionVolt car"></div>
                <div class="swiper-slide"><img th:src="@{/img/carList/CAR_B.jpg}" alt="MotionVolt car"></div>
                <div class="swiper-slide"><img th:src="@{/img/carList/CAR_C.jpg}" alt="MotionVolt car"></div>
                <div class="swiper-slide"><img th:src="@{/img/carList/CAR_D.jpg}" alt="MotionVolt car"></div>
            </div>
        </div>
        <div class="absolute left-1/2 top-20 z-10 w-[min(92vw,860px)] -translate-x-1/2 text-center text-white">
            <p class="mv-section-eyebrow text-white/80">MOTIONVOLT KOREA</p>
            <h1 class="mt-4 text-5xl font-semibold">한국의 도로에 맞춘 조용한 전동화.</h1>
            <a th:href="@{/cars}" class="mv-button mt-8 inline-block bg-white px-6 py-3 text-black">시승 신청</a>
        </div>
    </section>

    <section class="mv-shell py-16">
        <p class="mv-section-eyebrow">국내 인기 라인업</p>
        <h2 class="mt-2 text-3xl font-semibold">추천 모델</h2>
        <div class="swiper content-swiper mt-8">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img th:src="@{/img/carList/LC500h.png}" alt="LC500h"></div>
                <div class="swiper-slide"><img th:src="@{/img/carList/UX250hFSPORT.png}" alt="UX250h F Sport"></div>
                <div class="swiper-slide"><img th:src="@{/img/carList/LS500.png}" alt="LS500"></div>
                <div class="swiper-slide"><img th:src="@{/img/carList/ES300h.png}" alt="ES300h"></div>
            </div>
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
            <div class="swiper-pagination"></div>
        </div>
    </section>

    <section class="grid md:grid-cols-3">
        <div class="relative min-h-[420px] overflow-hidden">
            <img th:src="@{/img/carList/main02_1.png}" class="h-full w-full object-cover" alt="Finance">
            <div class="absolute left-8 top-8">
                <h3 class="text-2xl font-semibold">맞춤 금융 프로그램</h3>
                <p class="mt-2 text-sm">더 합리적인 방식으로 만나는 MotionVolt.</p>
            </div>
        </div>
        <div class="relative min-h-[420px] overflow-hidden">
            <img th:src="@{/img/carList/main02_2.png}" class="h-full w-full object-cover" alt="Certified cars">
            <div class="absolute left-8 top-8">
                <h3 class="text-2xl font-semibold">인증 중고차</h3>
                <p class="mt-2 text-sm">구매부터 판매까지 신뢰를 이어갑니다.</p>
            </div>
        </div>
        <div class="relative min-h-[420px] overflow-hidden">
            <img th:src="@{/img/carList/main02_3.png}" class="h-full w-full object-cover" alt="Service">
            <div class="absolute left-8 top-8">
                <h3 class="text-2xl font-semibold">전국 케어 서비스</h3>
                <p class="mt-2 text-sm">예약과 관리까지 한 번에.</p>
            </div>
        </div>
    </section>
</main>
<div th:replace="fragments :: footer"></div>
</body>
</html>
