<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Option | MotionVolt</title>
    <link rel="stylesheet" th:href="@{/css/apple.css}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script th:src="@{/js/carListOption.js}" defer></script>
</head>
<body>
<div th:replace="fragments :: header"></div>
<main class="mv-shell py-12">
    <a href="javascript:history.back()" class="text-sm text-blue-600">뒤로 돌아가기</a>
    <div class="mt-8 grid gap-10 lg:grid-cols-[0.9fr_1.1fr]">
        <section>
            <p class="mv-section-eyebrow">모델 사양</p>
            <h1 class="mt-2 text-4xl font-semibold">원하는 사양을 선택하세요.</h1>
            <p class="mt-5 text-gray-600">시승 예약에 사용할 차량 옵션입니다.</p>
        </section>
        <section class="grid gap-4">
            <button th:each="option : ${carListOption}" type="button"
                    class="js-option-card mv-panel w-full p-5 text-left transition hover:-translate-y-1 hover:border-blue-500"
                    th:data-id="${option.id}">
                <span class="text-xs text-gray-500" th:text="${option.grade}">Grade</span>
                <strong class="mt-2 block text-xl" th:text="|${option.color} / ${option.cc}cc|">Color</strong>
                <span class="mt-3 block text-sm text-gray-600" th:text="|가격 ${option.price}$ · 연비 ${option.km}km|">Option</span>
            </button>
            <p th:if="${#lists.isEmpty(carListOption)}" class="mv-panel p-8 text-center">옵션 선택이 없습니다.</p>
        </section>
    </div>
</main>
<div th:replace="fragments :: footer"></div>
</body>
</html>
