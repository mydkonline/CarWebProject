<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Center | MotionVolt</title>
    <link rel="stylesheet" th:href="@{/css/apple.css}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script th:src="@{/js/center.js}" defer></script>
</head>
<body>
<div th:replace="fragments :: header"></div>
<main class="mv-shell py-12">
    <a href="javascript:history.back()" class="text-sm text-blue-600">뒤로 돌아가기</a>
    <div class="mt-8 grid gap-10 lg:grid-cols-[0.9fr_1.1fr]">
        <section>
            <p class="mv-section-eyebrow">전국 전시장</p>
            <h1 class="mt-2 text-4xl font-semibold">가까운 센터를 선택하세요.</h1>
        </section>
        <section class="grid gap-4">
            <button th:each="item : ${center}" type="button"
                    class="js-center-card mv-panel w-full p-5 text-left transition hover:-translate-y-1 hover:border-blue-500"
                    th:data-id="${item.id}"
                    th:data-option-id="${optionId}">
                <strong class="text-xl" th:text="${item.name}">Center</strong>
                <span class="mt-2 block text-sm text-gray-600" th:text="${item.address}">Address</span>
                <span class="mt-1 block text-sm text-gray-500" th:text="|전화번호: ${item.number}|">Number</span>
            </button>
        </section>
    </div>
</main>
<div th:replace="fragments :: footer"></div>
</body>
</html>
