<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog | MotionVolt</title>
    <link rel="icon" th:href="@{/img/favicon.ico}">
    <link rel="stylesheet" th:href="@{/css/apple.css}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script th:src="@{/js/carList.js}" defer></script>
</head>
<body>
<div th:replace="fragments :: header"></div>
<main class="mv-shell py-12">
    <p class="mv-section-eyebrow">시승 신청</p>
    <h1 class="mt-2 text-4xl font-semibold">시승할 모델을 선택하세요.</h1>
    <div class="mt-10 grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
        <article th:each="car : ${carList}"
                 class="js-car-card mv-panel cursor-pointer overflow-hidden transition hover:-translate-y-1"
                 role="button"
                 tabindex="0"
                 th:data-id="${car.id}"
                 th:data-brand="${car.brand}"
                 th:data-model="${car.model}">
            <img th:src="@{/img/carList/{model}.png(model=${car.model})}" th:alt="${car.model}" class="h-56 w-full object-cover">
            <div class="p-5">
                <p class="text-sm text-gray-500" th:text="${car.brand}">Brand</p>
                <h2 class="mt-1 text-2xl font-semibold" th:text="${car.model}">Model</h2>
            </div>
        </article>
    </div>
</main>
<div th:replace="fragments :: footer"></div>
</body>
</html>
