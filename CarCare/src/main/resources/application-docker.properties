spring.datasource.url=${DB_URL:jdbc:postgresql://db:5432/carcare}
spring.datasource.username=${DB_USERNAME:carcare}
spring.datasource.password=${DB_PASSWORD:carcare}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.sql.init.mode=${SQL_INIT_MODE:always}
spring.sql.init.data-locations=classpath:data.sql,classpath:data-postgresql.sql
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.h2.console.enabled=false
