services:
  db:
    image: postgres:16-alpine
    container_name: carcare-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-carcare}
      POSTGRES_USER: ${POSTGRES_USER:-carcare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-carcare}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - carcare-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-carcare} -d ${POSTGRES_DB:-carcare}"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: carcare-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 18081
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-carcare}
      DB_USERNAME: ${POSTGRES_USER:-carcare}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-carcare}
      SQL_INIT_MODE: ${SQL_INIT_MODE:-always}
      KAKAO_REDIRECT_URI: http://localhost:18081/oauth/kakao/callback
    ports:
      - "${API_PORT:-18081}:18081"

  mobile:
    build:
      context: ./mobile
      dockerfile: Dockerfile
    container_name: carcare-mobile
    depends_on:
      - api
    environment:
      EXPO_NO_TELEMETRY: 1
      CHOKIDAR_USEPOLLING: "true"
      EXPO_PUBLIC_API_BASE_URL: ${EXPO_PUBLIC_API_BASE_URL:-http://localhost:18081}
    ports:
      - "${WEB_PORT:-19006}:19006"
    stdin_open: true
    tty: true

volumes:
  carcare-postgres-data:
